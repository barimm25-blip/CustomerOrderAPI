<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customers - Customer Order Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
            <div style="width:36px; height:36px; background:#3498db; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px;">📦</div>
            <div style="display:flex; flex-direction:column; line-height:1.2;">
                <span style="color:white; font-size:16px; font-weight:700; letter-spacing:0.5px;">ORDER MANAGEMENT</span>
                <span style="color:#3498db; font-size:9px; letter-spacing:2px;">OrderFlow</span>
            </div>
        </a>
        <div class="nav-links">
            <a href="index.html">📊 Dashboard</a>
            <a href="orders.html" class="active">📋 Orders</a>
            <a href="products.html">📦 Products</a>
            <a href="customers.html">👥 Customers</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Customers</h1>
            <button class="btn btn-primary" onclick="openCreateModal()">➕ Add Customer</button>
        </div>

        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Search by name or code..."
                   oninput="loadCustomers()" style="padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;width:280px">
        </div>

        <div class="card">
            <table class="table">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Contact</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="customerTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div id="createModal" class="modal" style="display:none">
        <div class="modal-box">
            <h2 id="modalTitle">Add Customer</h2>
            <div class="form-group">
                <label>Customer Code</label>
                <input type="text" id="customerCode" placeholder="C001">
            </div>
            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="customerName" placeholder="Company name">
            </div>
            <div class="form-group">
                <label>Contact Name</label>
                <input type="text" id="contactName" placeholder="Contact person">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="phone" placeholder="02-xxx-xxxx">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="email@company.com">
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="submitCustomer()">Save</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/customers.js"></script>
</body>
</html>
